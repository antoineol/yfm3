<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FFEC80"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#A67C00"/>
    </linearGradient>
    <linearGradient id="darkgold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A800"/>
      <stop offset="100%" stop-color="#7A5C00"/>
    </linearGradient>
    <linearGradient id="shine" x1="0.2" y1="0" x2="0.8" y2="0.6">
      <stop offset="0%" stop-color="#FFFDE0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE44D"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
  <!-- Pyramid body — fills the square edge-to-edge -->
  <polygon points="32,62 2,10 62,10" fill="url(#gold)" stroke="#8B6914" stroke-width="0.5"/>
  <!-- Left face shadow for depth -->
  <polygon points="32,62 2,10 32,10" fill="rgba(0,0,0,0.1)"/>
  <!-- Shine on right face -->
  <polygon points="32,62 62,10 32,10" fill="url(#shine)"/>
  <!-- Puzzle seam lines -->
  <line x1="17" y1="10" x2="32" y2="38" stroke="#8B6914" stroke-width="1" opacity="0.7"/>
  <line x1="47" y1="10" x2="32" y2="38" stroke="#8B6914" stroke-width="1" opacity="0.7"/>
  <line x1="10" y1="22" x2="54" y2="22" stroke="#8B6914" stroke-width="0.8" opacity="0.6"/>
  <line x1="16" y1="36" x2="48" y2="36" stroke="#8B6914" stroke-width="0.8" opacity="0.6"/>
  <!-- Eye of Wadjet — bold, centered -->
  <ellipse cx="32" cy="27" rx="8.5" ry="6" fill="none" stroke="#5C3D00" stroke-width="2.2"/>
  <circle cx="32" cy="27" r="3.5" fill="#5C3D00"/>
  <!-- Inner eye highlight -->
  <circle cx="33.2" cy="25.8" r="1.2" fill="#C9A800" opacity="0.6"/>
  <!-- Ring / loop at top -->
  <circle cx="32" cy="5.5" r="4.5" fill="none" stroke="url(#ring)" stroke-width="3"/>
  <!-- Chain link connecting ring to pyramid -->
  <rect x="30" y="8" width="4" height="3" rx="0.5" fill="url(#darkgold)"/>
</svg>
