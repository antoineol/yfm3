name: Tag Bridge Release

on:
  push:
    branches: [main]
    paths: [bridge/package.json]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version and tag if new
        run: |
          VERSION=$(node -p "require('./bridge/package.json').version")
          TAG="bridge-v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            echo "Creating tag $TAG"
            git tag "$TAG"
            git push origin "$TAG"
          fi
